name: Build and Deploy Journal Discovery

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser test dependency
        run: python -m pip install -r requirements-dev.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Download latest DOAJ CSV
        run: |
          mkdir -p data/raw
          curl -L --retry 3 --fail https://doaj.org/csv -o "data/raw/doaj.csv" || echo "DOAJ download skipped; build will continue without enrichment."

      - name: Run guarded dataset refresh workflow
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: python scripts/update_source_data.py --scimago data/raw/scimagojr.csv --wos data/raw/scimagojr_wos.csv --doaj data/raw/doaj.csv

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
