name: Keep Render LLM API Awake

on:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping-render:
    if: ${{ vars.LLM_ABSTRACT_MATCH_ENABLED == 'true' && vars.LLM_API_BASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          LLM_API_BASE_URL: ${{ vars.LLM_API_BASE_URL }}
        run: |
          set -euo pipefail
          health_url="${LLM_API_BASE_URL%/}/healthz"
          echo "Pinging ${health_url}"
          curl --fail --silent --show-error --location \
            --retry 6 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 30 \
            "${health_url}"
