<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Scientific Discovery</title>
	<style>
		:root {
			--bg: #f5f7fb;
			--card: #ffffff;
			--text: #1f2a37;
			--muted: #5d6b82;
			--primary: #0f4c81;
			--primary-soft: #e8f0fa;
			--border: #dce4ef;
			--ok: #0e7490;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
			color: var(--text);
			background: var(--bg);
			line-height: 1.45;
		}
		a { color: var(--primary); text-decoration: none; }
		a:hover { text-decoration: underline; }
		.container {
			width: min(1100px, 92vw);
			margin: 0 auto;
		}
		.topbar {
			background: #0b2f53;
			color: #fff;
			padding: 12px 0;
			border-bottom: 1px solid #194472;
		}
		.topbar-inner {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
		}
		.brand {
			font-weight: 700;
			letter-spacing: .2px;
		}
		.top-links {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			font-size: 14px;
		}
		.top-links a { color: #c8def6; }

		.hero {
			margin-top: 20px;
			background: linear-gradient(145deg, #f0f6fe, #ffffff);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 26px 22px;
		}
		.hero h1 {
			margin: 0 0 8px;
			font-size: clamp(26px, 3vw, 35px);
			color: #0b3760;
		}
		.hero p {
			margin: 0 0 18px;
			color: var(--muted);
			max-width: 820px;
		}
		.search-box {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 14px;
			display: grid;
			grid-template-columns: 1fr 220px 120px;
			gap: 10px;
		}
		.search-box input,
		.search-box select,
		.search-box button {
			width: 100%;
			min-height: 46px;
			border-radius: 10px;
			border: 1px solid var(--border);
			padding: 0 12px;
			font-size: 15px;
		}
		.search-box input:focus,
		.search-box select:focus {
			outline: 2px solid #b8d3f0;
			border-color: #9cc1e6;
		}
		.search-box button {
			background: var(--primary);
			color: #fff;
			border-color: var(--primary);
			font-weight: 600;
			cursor: pointer;
			transition: background-color 140ms ease, transform 90ms ease, box-shadow 140ms ease, opacity 140ms ease;
		}
		.search-box button:hover {
			background: #0c3f6a;
			box-shadow: 0 4px 14px rgba(15, 76, 129, 0.22);
		}
		.search-box button:active {
			transform: translateY(1px) scale(0.99);
			box-shadow: none;
		}
		.search-box button:focus-visible {
			outline: 2px solid #b8d3f0;
			outline-offset: 1px;
		}
		.search-box button:disabled {
			opacity: 0.55;
			cursor: not-allowed;
			box-shadow: none;
		}

		.section {
			margin-top: 20px;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 18px;
		}
		.section h2 {
			margin: 0 0 10px;
			font-size: 20px;
			color: #12395e;
		}
		.muted { color: var(--muted); }

		.kpi-grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 10px;
			margin-top: 12px;
		}
		.kpi-card {
			background: #fbfdff;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 12px;
		}
		.kpi-card .label {
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 6px;
		}
		.kpi-card .value {
			font-size: 22px;
			font-weight: 700;
			color: #0f3d69;
		}
		.kpi-chart-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 12px;
			margin-top: 12px;
		}
		.kpi-chart {
			background: #fbfdff;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 12px;
		}
		.kpi-chart h3 {
			margin: 0 0 10px;
			font-size: 15px;
			color: #163f68;
		}
		.kpi-chart-row {
			display: grid;
			grid-template-columns: 130px 1fr auto;
			align-items: center;
			gap: 8px;
			margin-bottom: 8px;
		}
		.kpi-chart-row:last-child {
			margin-bottom: 0;
		}
		.kpi-chart-label {
			font-size: 12px;
			color: var(--muted);
		}
		.kpi-chart-bar {
			height: 9px;
			background: #e8f0fa;
			border-radius: 999px;
			overflow: hidden;
		}
		.kpi-chart-fill {
			height: 100%;
			background: var(--primary);
		}
		.kpi-chart-value {
			font-size: 12px;
			font-weight: 700;
			color: #163f68;
		}

		.list {
			display: grid;
			gap: 12px;
			margin-top: 12px;
		}
		.item {
			background: #fff;
			border: 1px solid var(--border);
			border-left: 4px solid #9ec1e5;
			border-radius: 10px;
			padding: 12px;
		}
		.item h3 {
			margin: 0 0 6px;
			font-size: 18px;
			color: #163f68;
		}
		.badge {
			display: inline-block;
			padding: 2px 8px;
			border-radius: 999px;
			border: 1px solid #b9d2ec;
			background: var(--primary-soft);
			font-size: 12px;
			color: #0c4678;
			margin-right: 4px;
			margin-bottom: 4px;
		}
		.meta-row {
			margin-top: 6px;
			color: var(--muted);
			font-size: 14px;
		}
		.back-link {
			display: inline-block;
			margin-bottom: 10px;
			font-weight: 600;
		}
		.empty {
			border: 1px dashed #b8c9dd;
			border-radius: 10px;
			padding: 14px;
			background: #f9fbfe;
			color: var(--muted);
		}
		.form-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 10px;
		}
		.form-grid .full {
			grid-column: 1 / -1;
		}
		.harvest-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
			margin-top: 8px;
		}
		.harvest-grid .kpi-card .value {
			font-size: 18px;
		}
		.field {
			display: grid;
			gap: 6px;
		}
		label {
			font-size: 13px;
			color: var(--muted);
		}
		input,
		select,
		textarea,
		button {
			font: inherit;
		}
		input,
		select,
		textarea {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px 11px;
			background: #fff;
		}
		textarea {
			min-height: 110px;
			resize: vertical;
		}
		.btn-row {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}
		.btn-primary,
		.btn-secondary,
		.btn-danger {
			border-radius: 10px;
			padding: 10px 14px;
			border: 1px solid transparent;
			cursor: pointer;
			font-weight: 600;
			transition: background-color 140ms ease, color 140ms ease, border-color 140ms ease, transform 90ms ease, box-shadow 140ms ease, opacity 140ms ease;
		}
		.btn-primary {
			background: var(--primary);
			color: #fff;
		}
		.btn-primary:hover {
			background: #0c3f6a;
			box-shadow: 0 4px 14px rgba(15, 76, 129, 0.22);
		}
		.btn-primary:active {
			transform: translateY(1px) scale(0.99);
			box-shadow: none;
		}
		.btn-secondary {
			background: #fff;
			border-color: var(--border);
			color: var(--text);
		}
		.btn-secondary:hover {
			background: #f4f8fd;
			border-color: #b9cce3;
			box-shadow: 0 3px 10px rgba(15, 76, 129, 0.1);
		}
		.btn-secondary:active {
			transform: translateY(1px) scale(0.99);
			box-shadow: none;
		}
		.btn-danger {
			background: #be123c;
			color: #fff;
		}
		.btn-danger:hover {
			background: #9f1239;
			box-shadow: 0 4px 14px rgba(190, 18, 60, 0.24);
		}
		.btn-danger:active {
			transform: translateY(1px) scale(0.99);
			box-shadow: none;
		}
		.btn-primary:focus-visible,
		.btn-secondary:focus-visible,
		.btn-danger:focus-visible {
			outline: 2px solid #b8d3f0;
			outline-offset: 1px;
		}
		.btn-primary:disabled,
		.btn-secondary:disabled,
		.btn-danger:disabled {
			opacity: 0.55;
			cursor: not-allowed;
			box-shadow: none;
			transform: none;
		}
		.count-link {
			border: none;
			background: transparent;
			color: var(--primary);
			cursor: pointer;
			font-weight: 700;
			padding: 0;
			font-size: inherit;
		}
		.count-link:hover {
			text-decoration: underline;
		}
		.role-chip {
			display: inline-block;
			padding: 3px 9px;
			border-radius: 999px;
			background: #e7f3fe;
			border: 1px solid #bdd8f2;
			color: #1c4f7d;
			font-size: 12px;
			font-weight: 600;
		}
		footer {
			margin: 24px 0 28px;
			font-size: 13px;
			color: var(--muted);
			text-align: center;
		}
		@media (max-width: 900px) {
			.search-box {
				grid-template-columns: 1fr;
			}
			.kpi-grid {
				grid-template-columns: repeat(2, 1fr);
			}
			.form-grid {
				grid-template-columns: 1fr;
			}
			.harvest-grid {
				grid-template-columns: 1fr;
			}
			.kpi-chart-grid {
				grid-template-columns: 1fr;
			}
			.kpi-chart-row {
				grid-template-columns: 110px 1fr auto;
			}
		}
	</style>
</head>
<body>
	<header class="topbar">
		<div class="container topbar-inner">
			<div class="brand">Scientific Discovery</div>
			<nav class="top-links">
				<a href="#/">Home</a>
				<a href="#/search/journal?q=">Browse Journal</a>
				<a href="#/search/article?q=">Article Search</a>
				<a href="#/search/author?q=">Author Search</a>
				<a href="#/backend">Backoffice</a>
			</nav>
		</div>
	</header>

	<main id="app" class="container"></main>

	<footer>
		Demo version for rapid MVP validation. Data shown is sample metadata.
	</footer>

	<script>
		const STORAGE_KEYS = {
			endpoints: "journalIndexer.endpoints",
			harvestedArticles: "journalIndexer.harvestedArticles",
			journalOverrides: "journalIndexer.journalOverrides",
			deletedJournals: "journalIndexer.deletedJournals",
			posts: "journalIndexer.posts",
			users: "journalIndexer.users",
			role: "journalIndexer.role",
			theme: "journalIndexer.theme",
			migration: "journalIndexer.migration"
		};

		const UNACCREDITED_LABEL = "Unaccredited";
		const UNINDEXED_LABEL = "Unindexed";
		const API_BASE_URL = "http://127.0.0.1:8000/api/v1";
		const REPO_STATE_URL = "http://127.0.0.1:8787/state";
		const PERSISTENT_KEYS = new Set([
			STORAGE_KEYS.endpoints,
			STORAGE_KEYS.harvestedArticles,
			STORAGE_KEYS.journalOverrides,
			STORAGE_KEYS.deletedJournals,
			STORAGE_KEYS.posts,
			STORAGE_KEYS.users
		]);

		const journals = [];

		const articles = [];

		applyOneTimeDataResetMigration();

		const app = document.getElementById("app");
		const loadedEndpoints = loadData(STORAGE_KEYS.endpoints, []);
		let endpointEntries = mergeSeedEndpoints(loadedEndpoints);
		let harvestedArticles = loadData(STORAGE_KEYS.harvestedArticles, []);
		let journalOverrides = loadObjectData(STORAGE_KEYS.journalOverrides, {});
		let deletedJournalIds = loadData(STORAGE_KEYS.deletedJournals, []);
		let contentPosts = loadData(STORAGE_KEYS.posts, []);
		let curatorUsers = loadData(STORAGE_KEYS.users, []);
		let currentRole = localStorage.getItem(STORAGE_KEYS.role) || "";
		let themeSetting = localStorage.getItem(STORAGE_KEYS.theme) || "default";
		let backofficeSelectedEndpointId = "";
		let backofficeSelectedMetadataJournalId = "";
		let proxyHealthStatus = "unchecked";
		let isHydratingPersistentState = false;
		let persistentSaveTimer = null;
		let apiAccessToken = "";
		let isApiAvailable = false;

		if (endpointEntries.length !== loadedEndpoints.length) {
			persistData(STORAGE_KEYS.endpoints, endpointEntries);
		}

		function applyOneTimeDataResetMigration() {
			const currentMigrationVersion = "2026-03-04-reset-sample-data";
			const appliedVersion = localStorage.getItem(STORAGE_KEYS.migration);
			if (appliedVersion === currentMigrationVersion) return;

			[
				STORAGE_KEYS.endpoints,
				STORAGE_KEYS.harvestedArticles,
				STORAGE_KEYS.journalOverrides,
				STORAGE_KEYS.deletedJournals,
				STORAGE_KEYS.posts,
				STORAGE_KEYS.users,
				STORAGE_KEYS.role
			].forEach((key) => localStorage.removeItem(key));

			localStorage.setItem(STORAGE_KEYS.migration, currentMigrationVersion);
		}

		function mapEndpointEntryToJournal(entry) {
			return {
				id: `oai_${entry.id}`,
				name: entry.journalName || "Untitled OAI Journal",
				category: entry.category || "Uncategorized",
				sintaRank: entry.sintaRank || "Not set",
				accreditation: entry.accreditation || "OAI Source",
				indexes: Array.isArray(entry.indexes) ? entry.indexes : [],
				publisher: entry.repositoryName || "OAI Repository",
				issn: entry.issn || "n/a",
				oaiPmhUrl: entry.oaiUrl || "",
				scope: "",
				oaiProfile: {
					repositoryName: entry.repositoryName || extractRepositoryHint(entry.oaiUrl || ""),
					baseUrl: entry.oaiUrl || "",
					protocolVersion: "2.0",
					adminEmail: entry.adminEmail || "n/a",
					earliestDatestamp: entry.earliestDatestamp || "n/a",
					deletedRecord: entry.deletedRecord || "n/a",
					granularity: entry.granularity || "n/a",
					metadataFormats: Array.isArray(entry.metadataFormats) ? entry.metadataFormats : ["oai_dc"]
				},
				isEndpointOnly: true
			};
		}

		function getSearchableJournals() {
			const baseNameSet = new Set(journals.map((journal) => normalized(journal.name)));
			const endpointMapped = endpointEntries
				.map((entry) => mapEndpointEntryToJournal(entry))
				.filter((journal) => !baseNameSet.has(normalized(journal.name)));
			const deletedSet = new Set((deletedJournalIds || []).map((id) => String(id)));

			return [...journals, ...endpointMapped]
				.filter((journal) => !deletedSet.has(String(journal.id)))
				.map((journal) => {
				const override = journalOverrides[journal.id] || {};
				const sintaRank = normalizeSintaRank(override.sintaRank || journal.sintaRank);
				const indexes = normalizeIndexes(Array.isArray(override.indexes) ? override.indexes : journal.indexes);
				return {
					...journal,
					...override,
					sintaRank,
					accreditation: sintaRank === UNACCREDITED_LABEL ? UNACCREDITED_LABEL : "National Accredited",
					indexes
				};
				});
		}

		function articleIdentity(article) {
			return normalized(article.oaiIdentifier || `${article.title}|${article.journalId}`);
		}

		function getSearchableArticles() {
			const endpointJournalIds = new Set(endpointEntries.map((entry) => `oai_${entry.id}`));
			const validHarvested = harvestedArticles.filter((article) => endpointJournalIds.has(article.journalId));
			const deletedSet = new Set((deletedJournalIds || []).map((id) => String(id)));

			const all = [...articles, ...validHarvested];
			const uniqueMap = new Map();
			all.forEach((article) => {
				uniqueMap.set(articleIdentity(article), article);
			});
			return [...uniqueMap.values()].filter((article) => !deletedSet.has(String(article.journalId)));
		}

		const getJournal = (id) => getSearchableJournals().find((journal) => journal.id === id);
		const getArticle = (id) => getSearchableArticles().find((article) => article.id === id);

		applyTheme(themeSetting);

		function loadData(key, fallback) {
			try {
				const raw = localStorage.getItem(key);
				if (!raw) return fallback;
				const parsed = JSON.parse(raw);
				return Array.isArray(parsed) ? parsed : fallback;
			} catch {
				return fallback;
			}
		}

		function loadObjectData(key, fallback) {
			try {
				const raw = localStorage.getItem(key);
				if (!raw) return fallback;
				const parsed = JSON.parse(raw);
				return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : fallback;
			} catch {
				return fallback;
			}
		}

		function persistData(key, value) {
			localStorage.setItem(key, JSON.stringify(value));
			if (!isApiAvailable && PERSISTENT_KEYS.has(key)) {
				schedulePersistentStateSave();
			}
		}

		function toApiEndpointId(value) {
			const normalizedId = String(value || "").replace(/^oai_/, "");
			const parsed = Number(normalizedId);
			return Number.isFinite(parsed) ? parsed : null;
		}

		async function apiRequest(path, options = {}) {
			const headers = {
				"Content-Type": "application/json",
				...(options.headers || {})
			};

			if (apiAccessToken) {
				headers.Authorization = `Bearer ${apiAccessToken}`;
			}

			const response = await fetch(`${API_BASE_URL}${path}`, {
				...options,
				headers
			});

			if (!response.ok) {
				let message = `API ${response.status}`;
				try {
					const data = await response.json();
					if (data?.detail) message = String(data.detail);
				} catch {
				}
				throw new Error(message);
			}

			const contentType = response.headers.get("Content-Type") || "";
			if (contentType.includes("application/json")) {
				return response.json();
			}
			return null;
		}

		async function ensureApiSession() {
			if (apiAccessToken) return true;
			try {
				const payload = await apiRequest("/auth/login", {
					method: "POST",
					headers: {},
					body: JSON.stringify({ username: "admin", password: "admin123" })
				});
				apiAccessToken = payload?.access_token || "";
				return Boolean(apiAccessToken);
			} catch {
				apiAccessToken = "";
				return false;
			}
		}

		async function syncStateFromApi() {
			const sessionReady = await ensureApiSession();
			if (!sessionReady) return false;

			try {
				const [endpoints, journalsFromApi, articlesResponse] = await Promise.all([
					apiRequest("/endpoints", { method: "GET" }),
					apiRequest("/journals", { method: "GET" }),
					apiRequest("/articles", { method: "GET" })
				]);

				const journalByEndpoint = new Map((journalsFromApi || []).map((item) => [item.endpoint_id, item]));
				const articlesByEndpoint = new Map();
				const apiArticles = Array.isArray(articlesResponse?.items) ? articlesResponse.items : [];
				apiArticles.forEach((article) => {
					const endpointId = String(article.endpoint_id);
					if (!articlesByEndpoint.has(endpointId)) {
						articlesByEndpoint.set(endpointId, []);
					}
					articlesByEndpoint.get(endpointId).push(article);
				});

				endpointEntries = (endpoints || []).map((endpoint) => {
					const endpointId = String(endpoint.id);
					const journalProfile = journalByEndpoint.get(endpoint.id);
					const endpointArticleCount = (articlesByEndpoint.get(endpointId) || []).length;
					return {
						id: endpointId,
						journalName: endpoint.journal_name || endpoint.repository_name || `Endpoint ${endpointId}`,
						category: journalProfile?.category || endpoint.category || "Uncategorized",
						oaiUrl: endpoint.oai_url,
						repositoryName: endpoint.repository_name || extractRepositoryHint(endpoint.oai_url),
						metadataPrefix: endpoint.metadata_prefix || "oai_dc",
						adminEmail: endpoint.admin_email || "",
						earliestDatestamp: "",
						deletedRecord: "persistent",
						granularity: "YYYY-MM-DDThh:mm:ssZ",
						metadataFormats: Array.isArray(endpoint.metadata_formats) ? endpoint.metadata_formats : ["oai_dc"],
						addedBy: "API",
						createdAt: endpoint.created_at || new Date().toISOString(),
						harvestStatus: {
							lastHarvestAt: "",
							inserted: endpointArticleCount,
							updated: 0,
							deleted: 0,
							metadataPrefix: endpoint.metadata_prefix || "oai_dc",
							resumptionTokenStatus: "unknown",
							errorCount: 0,
							lastErrorMessage: "",
							validRecordsPercent: endpointArticleCount ? 100 : 0
						}
					};
				});

				harvestedArticles = apiArticles.map((article) => ({
					id: `harv_${article.id}`,
					journalId: `oai_${article.endpoint_id}`,
					title: article.title,
					authors: Array.isArray(article.authors) ? article.authors : [],
					abstract: article.abstract || "",
					doi: article.doi || "",
					articleUrl: article.article_url || "",
					year: Number(article.year || 0),
					language: article.language || "",
					rights: article.rights || "",
					oaiIdentifier: article.oai_identifier || `oai:${article.id}`,
					datestamp: "",
					setSpec: [],
					identifiers: [article.doi, article.article_url].filter(Boolean),
					endpointUrl: "",
					sourceEndpointId: String(article.endpoint_id),
					metadataPrefix: "oai_dc",
					isEndpointOnly: true
				}));

				journalOverrides = Object.fromEntries(
					(journalsFromApi || []).map((item) => [
						`oai_${item.endpoint_id}`,
						{
							category: item.category || "Uncategorized",
							sintaRank: item.accreditation_rank || UNACCREDITED_LABEL,
							accreditation: item.accreditation_rank === UNACCREDITED_LABEL ? UNACCREDITED_LABEL : "National Accredited",
							indexes: normalizeIndexes(item.indexes || [])
						}
					])
				);

				deletedJournalIds = [];
				persistData(STORAGE_KEYS.endpoints, endpointEntries);
				persistData(STORAGE_KEYS.harvestedArticles, harvestedArticles);
				localStorage.setItem(STORAGE_KEYS.journalOverrides, JSON.stringify(journalOverrides));
				persistData(STORAGE_KEYS.deletedJournals, deletedJournalIds);

				isApiAvailable = true;
				return true;
			} catch {
				return false;
			}
		}

		function collectPersistentStateSnapshot() {
			return {
				endpoints: endpointEntries,
				harvestedArticles,
				journalOverrides,
				deletedJournals: deletedJournalIds,
				posts: contentPosts,
				users: curatorUsers
			};
		}

		function applyPersistentStateSnapshot(state) {
			if (!state || typeof state !== "object") return;

			endpointEntries = mergeSeedEndpoints(Array.isArray(state.endpoints) ? state.endpoints : []);
			harvestedArticles = Array.isArray(state.harvestedArticles) ? state.harvestedArticles : [];
			journalOverrides = state.journalOverrides && typeof state.journalOverrides === "object" && !Array.isArray(state.journalOverrides)
				? state.journalOverrides
				: {};
			deletedJournalIds = Array.isArray(state.deletedJournals) ? state.deletedJournals : [];
			contentPosts = Array.isArray(state.posts) ? state.posts : [];
			curatorUsers = Array.isArray(state.users) ? state.users : [];

			localStorage.setItem(STORAGE_KEYS.endpoints, JSON.stringify(endpointEntries));
			localStorage.setItem(STORAGE_KEYS.harvestedArticles, JSON.stringify(harvestedArticles));
			localStorage.setItem(STORAGE_KEYS.journalOverrides, JSON.stringify(journalOverrides));
			localStorage.setItem(STORAGE_KEYS.deletedJournals, JSON.stringify(deletedJournalIds));
			localStorage.setItem(STORAGE_KEYS.posts, JSON.stringify(contentPosts));
			localStorage.setItem(STORAGE_KEYS.users, JSON.stringify(curatorUsers));
		}

			if (isHydratingPersistentState) return;
			if (persistentSaveTimer) {

		function escapeHtml(text) {
			return (text || "")
				.replaceAll("&", "&amp;")

		function normalized(text) {
			return (text || "").toLowerCase().trim();
		}

		function normalizeSintaRank(value) {
			if (value === "Belum terakreditasi") return UNACCREDITED_LABEL;
			return value || UNACCREDITED_LABEL;
		}

		function normalizeIndexName(value) {
			if (value === "Belum terindeks") return UNINDEXED_LABEL;
			return value;
		}

		function normalizeIndexes(indexes) {
			const normalizedIndexes = (Array.isArray(indexes) ? indexes : [])
				.map(normalizeIndexName)
				.filter(Boolean);

			if (normalizedIndexes.includes(UNINDEXED_LABEL) || !normalizedIndexes.length) {
				return [UNINDEXED_LABEL];
			}

			return [...new Set(normalizedIndexes)];
		}

		function tokenizeQuery(query) {
			return normalized(query)
				.split(/\s+/)
				.map((token) => token.trim())
				.filter(Boolean);
		}

		function matchesPartial(targetText, query) {
			const tokens = tokenizeQuery(query);
			if (!tokens.length) return true;
			const haystack = normalized(targetText);
			return tokens.every((token) => haystack.includes(token));
		}

		function extractDoi(text) {
			if (!text) return "";
			const source = String(text).trim();
			const doiPattern = /(10\.\d{4,9}\/[-._;()/:A-Z0-9]+)/i;
			const match = source.match(doiPattern);
			if (!match) return "";
			return match[1].replace(/[\s>),.;]+$/g, "");
		}

		function extractUrl(text) {
			if (!text) return "";
			const source = String(text).trim();
			const urlPattern = /(https?:\/\/[^\s<>"')]+)/i;
			const match = source.match(urlPattern);
			if (!match) return "";
			return match[1].replace(/[\s>),.;]+$/g, "");
		}

		function resolvePrimaryAccess(article) {
			const identifierValues = Array.isArray(article.identifiers) ? article.identifiers : [];
			const directDoi = extractDoi(article.doi || "");
			const parsedDoi = identifierValues.map(extractDoi).find(Boolean) || "";
			const doi = directDoi || parsedDoi;

			if (doi) {
				return {
					type: "doi",
					label: `DOI: ${doi}`,
					href: `https://doi.org/${doi}`,
					doi
				};
			}

			const directUrl = extractUrl(article.articleUrl || "");
			const parsedUrl = identifierValues.map(extractUrl).find(Boolean) || "";
			const fallbackUrl = directUrl || parsedUrl;

			if (fallbackUrl) {
				return {
					type: "url",
					label: "Article URL",
					href: fallbackUrl,
					doi: ""
				};
			}

			return {
				type: "none",
				label: "No access identifier",
				href: "",
				doi: ""
			};
		}

		function extractRepositoryHint(url) {
			try {
				const parsed = new URL(url);
				const hostname = parsed.hostname;
				const pathBits = parsed.pathname.split("/").filter(Boolean);
				const lastBits = pathBits.slice(-2).join("/") || parsed.pathname;
				return `${hostname}/${lastBits}`;
			} catch {
				return url;
			}
		}

		function hashString(text) {
			const source = String(text || "");
			let hash = 0;
			for (let index = 0; index < source.length; index += 1) {
				hash = (hash << 5) - hash + source.charCodeAt(index);
				hash |= 0;
			}
			return Math.abs(hash).toString(36);
		}

		function extractYear(value) {
			const match = String(value || "").match(/(19|20)\d{2}/);
			return match ? Number(match[0]) : new Date().getFullYear();
		}

		function listValuesByLocalName(parentNode, localName) {
			if (!parentNode) return [];
			return [...parentNode.getElementsByTagNameNS("*", localName)]
				.map((node) => (node.textContent || "").trim())
				.filter(Boolean);
		}

		function uniqueValues(values) {
			return [...new Set((values || []).map((value) => String(value).trim()).filter(Boolean))];
		}

		function buildOaiListRecordsUrl(baseUrl, metadataPrefix, resumptionToken) {
			const separator = baseUrl.includes("?") ? "&" : "?";
			if (resumptionToken) {
				return `${baseUrl}${separator}verb=ListRecords&resumptionToken=${encodeURIComponent(resumptionToken)}`;
			}
			return `${baseUrl}${separator}verb=ListRecords&metadataPrefix=${encodeURIComponent(metadataPrefix || "oai_dc")}`;
		}

		function buildOaiVerbUrl(baseUrl, verb) {
			const separator = baseUrl.includes("?") ? "&" : "?";
			return `${baseUrl}${separator}verb=${encodeURIComponent(verb)}`;
		}

		async function fetchOaiXmlText(requestUrl) {
			const localProxyBase = "http://127.0.0.1:8787/oai?url=";
			const attempts = [
				{ type: "local-proxy", url: `${localProxyBase}${encodeURIComponent(requestUrl)}` },
				{ type: "direct", url: requestUrl },
				{ type: "allorigins", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(requestUrl)}` },
				{ type: "corsproxy", url: `https://corsproxy.io/?${encodeURIComponent(requestUrl)}` }
			];

			let lastError = "";
			for (const attempt of attempts) {
				try {
					const response = await fetch(attempt.url);
					if (!response.ok) {
						lastError = `HTTP ${response.status} via ${attempt.type}`;
						continue;
					}
					const text = await response.text();
					if (!text || !text.includes("<")) {
						lastError = `Empty response via ${attempt.type}`;
						continue;
					}
					return text;
				} catch (error) {
					lastError = error instanceof Error ? `${error.message} via ${attempt.type}` : `Fetch failed via ${attempt.type}`;
				}
			}

			throw new Error(
				`${lastError || "Failed to fetch OAI"}. This is usually a CORS restriction from browser-to-OAI endpoint. Run local proxy: python3 proxy_server.py`
			);
		}

		async function harvestEndpointRecords(endpointEntry) {
			const metadataPrefix = endpointEntry.metadataPrefix || "oai_dc";
			let resumptionToken = "";
			let pageCount = 0;
			const maxPages = 100;
			const parsedArticles = [];
			let activeRecords = 0;
			let validRecords = 0;
			let deletedRecords = 0;
			let parseErrors = 0;
			let lastErrorMessage = "";

			while (pageCount < maxPages) {
				const requestUrl = buildOaiListRecordsUrl(endpointEntry.oaiUrl, metadataPrefix, resumptionToken);
				const xmlText = await fetchOaiXmlText(requestUrl);
				const xml = new DOMParser().parseFromString(xmlText, "text/xml");

				const oaiError = xml.getElementsByTagNameNS("*", "error")[0];
				if (oaiError) {
					const message = (oaiError.textContent || "Unknown OAI error").trim();
					throw new Error(message || "OAI response error");
				}

				const recordNodes = [...xml.getElementsByTagNameNS("*", "record")];
				recordNodes.forEach((recordNode) => {
					try {
						const headerNode = recordNode.getElementsByTagNameNS("*", "header")[0];
						if (!headerNode) return;
						const isDeleted = headerNode.getAttribute("status") === "deleted";
						if (isDeleted) {
							deletedRecords += 1;
							return;
						}

						activeRecords += 1;
						const oaiIdentifier = listValuesByLocalName(headerNode, "identifier")[0] || "";
						const datestamp = listValuesByLocalName(headerNode, "datestamp")[0] || "";
						const setSpec = listValuesByLocalName(headerNode, "setSpec");

						const metadataNode = recordNode.getElementsByTagNameNS("*", "metadata")[0];
						if (!metadataNode) {
							parseErrors += 1;
							return;
						}

						const titles = listValuesByLocalName(metadataNode, "title");
						const creators = listValuesByLocalName(metadataNode, "creator");
						const descriptions = listValuesByLocalName(metadataNode, "description");
						const dates = listValuesByLocalName(metadataNode, "date");
						const identifiers = listValuesByLocalName(metadataNode, "identifier");
						const sources = listValuesByLocalName(metadataNode, "source");
						const relations = listValuesByLocalName(metadataNode, "relation");
						const languages = listValuesByLocalName(metadataNode, "language");
						const rights = listValuesByLocalName(metadataNode, "rights");

						const allIdentifierLike = uniqueValues([...identifiers, ...sources, ...relations]);
						const doi = allIdentifierLike.map(extractDoi).find(Boolean) || "";
						const articleUrl = allIdentifierLike.map(extractUrl).find(Boolean) || "";
						const title = titles[0] || "Untitled record";
						const abstract = descriptions.join("\n\n").trim();
						const year = extractYear(dates[0] || datestamp);

						parsedArticles.push({
							id: `harv_${hashString(oaiIdentifier || `${title}_${endpointEntry.id}_${datestamp}`)}`,
							journalId: `oai_${endpointEntry.id}`,
							title,
							authors: creators.length ? creators : ["Unknown"],
							abstract,
							doi,
							articleUrl,
							year,
							language: languages[0] || "",
							rights: rights[0] || "",
							oaiIdentifier,
							datestamp,
							setSpec,
							identifiers: allIdentifierLike,
							endpointUrl: endpointEntry.oaiUrl,
							sourceEndpointId: endpointEntry.id,
							metadataPrefix,
							isEndpointOnly: true
						});
						validRecords += 1;
					} catch (error) {
						parseErrors += 1;
						lastErrorMessage = error instanceof Error ? error.message : "Metadata parse error";
					}
				});

				const tokenNode = xml.getElementsByTagNameNS("*", "resumptionToken")[0];
				const nextToken = (tokenNode?.textContent || "").trim();
				resumptionToken = nextToken;
				pageCount += 1;
				if (!resumptionToken) break;
			}

			const byIdentity = new Map();
			parsedArticles.forEach((article) => {
				byIdentity.set(articleIdentity(article), article);
			});

			return {
				articles: [...byIdentity.values()],
				metrics: {
					activeRecords,
					validRecords,
					deletedRecords,
					parseErrors,
					pageCount,
					lastTokenStatus: pageCount > 1 ? "consumed" : "none",
					lastErrorMessage: lastErrorMessage || ""
				}
			};
		}

		function inferJournalNameFromRepository(repositoryName, oaiUrl) {
			const rawName = String(repositoryName || "").trim();
			if (rawName) {
				return rawName
					.replace(/\s+repository$/i, "")
					.replace(/\s+oai\s+repository$/i, "")
					.trim();
			}
			return extractRepositoryHint(oaiUrl || "") || "Untitled OAI Journal";
		}

		async function syncEndpointProfile(endpointEntry) {
			const identifyUrl = buildOaiVerbUrl(endpointEntry.oaiUrl, "Identify");
			const formatsUrl = buildOaiVerbUrl(endpointEntry.oaiUrl, "ListMetadataFormats");

			const identifyText = await fetchOaiXmlText(identifyUrl);
			const identifyXml = new DOMParser().parseFromString(identifyText, "text/xml");
			const identifyError = identifyXml.getElementsByTagNameNS("*", "error")[0];
			if (identifyError) {
				throw new Error((identifyError.textContent || "Identify failed").trim());
			}

			const repositoryName = listValuesByLocalName(identifyXml, "repositoryName")[0] || endpointEntry.repositoryName || "";
			const adminEmail = listValuesByLocalName(identifyXml, "adminEmail")[0] || endpointEntry.adminEmail || "";
			const earliestDatestamp = listValuesByLocalName(identifyXml, "earliestDatestamp")[0] || endpointEntry.earliestDatestamp || "";
			const deletedRecord = listValuesByLocalName(identifyXml, "deletedRecord")[0] || endpointEntry.deletedRecord || "persistent";
			const granularity = listValuesByLocalName(identifyXml, "granularity")[0] || endpointEntry.granularity || "YYYY-MM-DDThh:mm:ssZ";

			let metadataFormats = ["oai_dc"];
			try {
				const formatsText = await fetchOaiXmlText(formatsUrl);
				const formatsXml = new DOMParser().parseFromString(formatsText, "text/xml");
				const formatsError = formatsXml.getElementsByTagNameNS("*", "error")[0];
				if (!formatsError) {
					const prefixes = listValuesByLocalName(formatsXml, "metadataPrefix");
					if (prefixes.length) metadataFormats = uniqueValues(prefixes);
				}
			} catch {
				metadataFormats = endpointEntry.metadataFormats?.length ? endpointEntry.metadataFormats : ["oai_dc"];
			}

			return {
				journalName: inferJournalNameFromRepository(repositoryName, endpointEntry.oaiUrl),
				repositoryName: repositoryName || extractRepositoryHint(endpointEntry.oaiUrl),
				adminEmail,
				earliestDatestamp,
				deletedRecord,
				granularity,
				metadataFormats,
				metadataPrefix: metadataFormats.includes("oai_dc") ? "oai_dc" : metadataFormats[0] || "oai_dc"
			};
		}

		async function runFullHarvestForEndpoint(endpointId) {
			const targetEntry = endpointEntries.find((entry) => entry.id === endpointId);
			if (!targetEntry) throw new Error("Endpoint not found");

			const oldEndpointArticles = harvestedArticles.filter((article) => article.sourceEndpointId === endpointId);
			const oldByIdentity = new Map(oldEndpointArticles.map((article) => [articleIdentity(article), article]));

			const harvestResult = await harvestEndpointRecords(targetEntry);
			const harvestedForEndpoint = harvestResult.articles;
			const newByIdentity = new Map(harvestedForEndpoint.map((article) => [articleIdentity(article), article]));

			const inserted = [...newByIdentity.keys()].filter((key) => !oldByIdentity.has(key)).length;
			const updated = [...newByIdentity.keys()].filter((key) => oldByIdentity.has(key)).length;
			const deleted = [...oldByIdentity.keys()].filter((key) => !newByIdentity.has(key)).length;

			harvestedArticles = [...harvestedArticles.filter((article) => article.sourceEndpointId !== endpointId), ...harvestedForEndpoint];

			endpointEntries = endpointEntries.map((entry) => {
				if (entry.id !== endpointId) return entry;
				return {
					...entry,
					harvestStatus: {
						lastHarvestAt: new Date().toISOString(),
						inserted,
						updated,
						deleted,
						metadataPrefix: entry.metadataPrefix || "oai_dc",
						resumptionTokenStatus: harvestResult.metrics.lastTokenStatus,
						errorCount: harvestResult.metrics.parseErrors,
						lastErrorMessage: harvestResult.metrics.lastErrorMessage,
						validRecordsPercent: harvestResult.metrics.activeRecords
							? Math.round((harvestResult.metrics.validRecords / harvestResult.metrics.activeRecords) * 100)
							: 0
					}
				};
			});

			persistData(STORAGE_KEYS.harvestedArticles, harvestedArticles);
			persistData(STORAGE_KEYS.endpoints, endpointEntries);
		}

		function getKpi() {
			const allJournals = getSearchableJournals();
			const allArticles = getSearchableArticles();
			const countJournalsByCategory = (category) => allJournals.filter((journal) => journal.category === category).length;
			const countArticlesByCategory = (category) =>
				allArticles.filter((article) => getJournal(article.journalId)?.category === category).length;

					return !hasMainIndex || indexes.includes(UNINDEXED_LABEL);

				allJournals.filter((journal) => {
					const sintaValue = normalizeSintaRank(journal.sintaRank);
					return sintaValue === UNACCREDITED_LABEL;
				}).length;

				journalsScienceTech: countJournalsByCategory("Science and Technology"),

				articlesScienceTech: countArticlesByCategory("Science and Technology"),

				indexedScopus: countIndex("Scopus"),

					metadataFormats,
					addedBy: currentRole,
					createdAt,
					harvestStatus: {
						lastHarvestAt: "",
						inserted: 0,
						updated: 0,
						deleted: 0,
						metadataPrefix,
						resumptionTokenStatus: "none",
						errorCount: 0,
						lastErrorMessage: "",
						validRecordsPercent: 0
					}
				});
				persistData(STORAGE_KEYS.endpoints, endpointEntries);
				renderBackoffice();
			});

			document.getElementById("batch-endpoint-form").addEventListener("submit", async (event) => {
				event.preventDefault();
				const fileInput = document.getElementById("batch-endpoint-file");
				const statusEl = document.getElementById("batch-endpoint-status");
				const file = fileInput?.files?.[0];
				if (!file) {
					statusEl.textContent = "Please choose a .txt file first.";
					return;
				}

				const readText = await file.text();
				const lines = readText
					.split(/\r?\n/)
					.map((line) => line.trim())
					.filter(Boolean)
					.filter((line) => !line.startsWith("#"));

				const validUrls = uniqueValues(lines.filter((line) => /^https?:\/\//i.test(line)));
				if (!validUrls.length) {
					statusEl.textContent = "No valid OAI-PMH URL found in file.";
					return;
				}

				const existingUrlSet = new Set(endpointEntries.map((entry) => normalized(entry.oaiUrl || "")));
				const urlsToAdd = validUrls.filter((url) => !existingUrlSet.has(normalized(url)));
				if (!urlsToAdd.length) {
					statusEl.textContent = "All URLs already exist in endpoint list.";
					return;
				}

				const createdAt = new Date().toISOString();
				const newEntries = urlsToAdd.map((oaiUrl) => ({
					id: makeId("endpoint"),
					journalName: inferJournalNameFromRepository("", oaiUrl),
					category: "Uncategorized",
					oaiUrl,
					repositoryName: extractRepositoryHint(oaiUrl),
					metadataPrefix: "oai_dc",
					adminEmail: "",
					earliestDatestamp: "",
					deletedRecord: "persistent",
					granularity: "YYYY-MM-DDThh:mm:ssZ",
					metadataFormats: ["oai_dc"],
					addedBy: currentRole,
					createdAt,
					harvestStatus: {
						lastHarvestAt: "",
						inserted: 0,
						updated: 0,
						deleted: 0,
						metadataPrefix: "oai_dc",
						resumptionTokenStatus: "none",
						errorCount: 0,
						lastErrorMessage: "",
						validRecordsPercent: 0
					}
				}));

				endpointEntries = [...endpointEntries, ...newEntries];
				persistData(STORAGE_KEYS.endpoints, endpointEntries);

				statusEl.textContent = `Added ${newEntries.length} endpoint(s). Syncing and harvesting...`;

				let synced = 0;
				let harvested = 0;
				let failed = 0;

				for (const entry of newEntries) {
					try {
						const profile = await syncEndpointProfile(entry);
						endpointEntries = endpointEntries.map((item) =>
							item.id === entry.id
								? {
									...item,
									...profile,
									harvestStatus: {
										...(item.harvestStatus || {}),
										metadataPrefix: profile.metadataPrefix || item.metadataPrefix || "oai_dc"
									}
								}
								: item
						);
						persistData(STORAGE_KEYS.endpoints, endpointEntries);
						synced += 1;

						await runFullHarvestForEndpoint(entry.id);
						harvested += 1;
					} catch (error) {
						failed += 1;
						const message = error instanceof Error ? error.message : "Sync/harvest failed";
						endpointEntries = endpointEntries.map((item) =>
							item.id === entry.id
								? {
									...item,
									harvestStatus: {
										...(item.harvestStatus || {}),
										lastHarvestAt: new Date().toISOString(),
										errorCount: (item.harvestStatus?.errorCount || 0) + 1,
										lastErrorMessage: message
									}
								}
								: item
						);
						persistData(STORAGE_KEYS.endpoints, endpointEntries);
					}
				}

				statusEl.textContent = `Batch process done. Added: ${newEntries.length}, Synced: ${synced}, Harvested: ${harvested}, Failed: ${failed}.`;
				renderBackoffice();
			});

			app.querySelectorAll(".run-harvest-btn").forEach((button) => {
				button.addEventListener("click", async () => {
					const endpointId = button.dataset.endpointId;
					if (!endpointId) return;

					button.disabled = true;
					const originalLabel = button.textContent;
					button.textContent = "Harvesting...";

					try {
						await runFullHarvestForEndpoint(endpointId);
						renderBackoffice();
					} catch (error) {
						const message = error instanceof Error ? error.message : "Harvest failed";
						endpointEntries = endpointEntries.map((entry) => {
							if (entry.id !== endpointId) return entry;
							return {
								...entry,
								harvestStatus: {
									...(entry.harvestStatus || {}),
									lastHarvestAt: new Date().toISOString(),
									errorCount: (entry.harvestStatus?.errorCount || 0) + 1,
									lastErrorMessage: message,
									metadataPrefix: entry.metadataPrefix || "oai_dc"
								}
							};
						});
						persistData(STORAGE_KEYS.endpoints, endpointEntries);
						renderBackoffice();
					} finally {
						button.disabled = false;
						button.textContent = originalLabel;
					}
				});
			});

			app.querySelectorAll(".open-endpoint-articles").forEach((button) => {
				button.addEventListener("click", () => {
					const endpointId = button.dataset.endpointId;
					backofficeSelectedEndpointId = backofficeSelectedEndpointId === endpointId ? "" : endpointId;
					renderBackoffice();
				});
			});

			app.querySelectorAll(".edit-metadata-btn").forEach((button) => {
				button.addEventListener("click", () => {
					const journalId = button.dataset.journalId;
					backofficeSelectedMetadataJournalId = backofficeSelectedMetadataJournalId === journalId ? "" : journalId;
					renderBackoffice();
				});
			});

			app.querySelectorAll(".delete-journal-btn").forEach((button) => {
				button.addEventListener("click", () => {
					const journalId = button.dataset.journalId;
					const journalName = button.dataset.journalName || "this journal";
					if (!journalId) return;

					const confirmed = window.confirm(
						`Delete \"${journalName}\"?\n\nThis action will remove the journal profile and related harvested articles from the current index.`
					);
					if (!confirmed) return;

					if (journalId.startsWith("oai_")) {
						const endpointId = journalId.replace(/^oai_/, "");
						endpointEntries = endpointEntries.filter((entry) => entry.id !== endpointId);
						harvestedArticles = harvestedArticles.filter(
							(article) => article.sourceEndpointId !== endpointId && article.journalId !== journalId
						);
						if (backofficeSelectedEndpointId === endpointId) {
							backofficeSelectedEndpointId = "";
						}
					}

					if (!journalId.startsWith("oai_")) {
						const deletedSet = new Set((deletedJournalIds || []).map((id) => String(id)));
						deletedSet.add(String(journalId));
						deletedJournalIds = [...deletedSet];
					}

					if (backofficeSelectedMetadataJournalId === journalId) {
						backofficeSelectedMetadataJournalId = "";
					}

					if (journalOverrides[journalId]) {
						delete journalOverrides[journalId];
					}

					persistData(STORAGE_KEYS.endpoints, endpointEntries);
					persistData(STORAGE_KEYS.harvestedArticles, harvestedArticles);
					localStorage.setItem(STORAGE_KEYS.journalOverrides, JSON.stringify(journalOverrides));
					persistData(STORAGE_KEYS.deletedJournals, deletedJournalIds);
					renderBackoffice();
				});
			});

			app.querySelectorAll(".journal-index-checkbox").forEach((checkbox) => {
				checkbox.addEventListener("change", () => {
					const form = checkbox.closest(".journal-meta-form");
					if (!form) return;

					const allIndexCheckboxes = [...form.querySelectorAll("input[name='indexes']")];
					if (checkbox.value === UNINDEXED_LABEL && checkbox.checked) {
						allIndexCheckboxes.forEach((item) => {
							if (item !== checkbox) item.checked = false;
						});
						return;
					}

					if (checkbox.value !== UNINDEXED_LABEL && checkbox.checked) {
						const notIndexed = allIndexCheckboxes.find((item) => item.value === UNINDEXED_LABEL);
						if (notIndexed) notIndexed.checked = false;
					}
				});
			});

			app.querySelectorAll(".journal-meta-form").forEach((form) => {
				form.addEventListener("submit", (event) => {
					event.preventDefault();
					const journalId = form.dataset.journalId;
					if (!journalId) return;

					const category = form.querySelector("select[name='category']")?.value || "Science and Technology";
					const accreditationOption =
						form.querySelector("select[name='accreditationOption']")?.value || UNACCREDITED_LABEL;
					const selectedIndexes = [...form.querySelectorAll("input[name='indexes']:checked")].map((item) => item.value);

					const indexes = normalizeIndexes(selectedIndexes);

					const normalizedAccreditation = normalizeSintaRank(accreditationOption);
					const isAccredited = normalizedAccreditation !== UNACCREDITED_LABEL;
					journalOverrides = {
						...journalOverrides,
						[journalId]: {
							category,
							sintaRank: normalizedAccreditation,
							accreditation: isAccredited ? "National Accredited" : UNACCREDITED_LABEL,
							indexes
						}
					};

					localStorage.setItem(STORAGE_KEYS.journalOverrides, JSON.stringify(journalOverrides));
					renderBackoffice();
				});
			});

			document.getElementById("content-form").addEventListener("submit", (event) => {
				event.preventDefault();
				const title = document.getElementById("content-title").value.trim();
				const type = document.getElementById("content-type").value;
				const body = document.getElementById("content-body").value.trim();
				if (!title || !body) return;

				contentPosts.push({
					id: makeId("post"),
					title,
					type,
					body,
					role: currentRole,
					createdAt: new Date().toISOString()
				});
				persistData(STORAGE_KEYS.posts, contentPosts);
				renderBackoffice();
			});

			if (currentRole === "Administrator") {
				document.getElementById("user-form").addEventListener("submit", (event) => {
					event.preventDefault();
					const name = document.getElementById("user-name").value.trim();
					const email = document.getElementById("user-email").value.trim();
					if (!name || !email) return;

					curatorUsers.push({
						id: makeId("user"),
						name,
						email
					});
					persistData(STORAGE_KEYS.users, curatorUsers);
					renderBackoffice();
				});

				document.getElementById("theme-form").addEventListener("submit", (event) => {
					event.preventDefault();
					themeSetting = document.getElementById("theme-select").value;
					localStorage.setItem(STORAGE_KEYS.theme, themeSetting);
					applyTheme(themeSetting);
					renderBackoffice();
				});
			}
		}

		function renderAuthorResults(query) {
			const searchableArticles = getSearchableArticles();
			const q = normalized(query);

			let matches = [];
			if (q) {
				const allNames = [...new Set(searchableArticles.flatMap((article) => article.authors))];
				matches = allNames
					.filter((name) => normalized(name).includes(q))
					.map((name) => {
						const nameNorm = normalized(name);
						let score = 0.55;
						if (nameNorm === q) score = 0.98;
						else if (nameNorm.startsWith(q)) score = 0.85;
						else if (nameNorm.includes(q)) score = 0.7;

						const totalArticles = searchableArticles.filter((article) => article.authors.includes(name)).length;
						return { name, score, totalArticles };
					})
					.sort((left, right) => right.score - left.score);
			}

			app.innerHTML = `

					<a class="back-link" href="#/">← Back to Home</a>

					<a class="back-link" href="#/search/author?q=">← Back to Author Results</a>
					<h2>Author Profile: ${decodedName}</h2>
					<p class="muted">Possible author match from indexed journal metadata.</p>
				</section>

				<section class="section">
					<h2>Associated Articles</h2>
					<div class="list">
						${
							authoredArticles.length
								? authoredArticles
										.map((article) => {
											const journal = getJournal(article.journalId);
											return `
												<article class="item">
													<h3><a href="#/article/${article.id}">${article.title}</a></h3>
													<div class="meta-row">Journal: <a href="#/journal/${journal.id}">${journal.name}</a></div>
												</article>
											`;
										})
										.join("")
								: `<div class="empty">No articles are associated with this author name in the current index.</div>`
						}
					</div>
				</section>
			`;
		}

		function router() {
			const hash = window.location.hash || "#/";
			const [path, queryString] = hash.slice(2).split("?");
			const params = new URLSearchParams(queryString || "");

			if (!path || path === "/" || path === "") {
				renderHome();
				return;
			}

			const segments = path.split("/").filter(Boolean);
			const first = segments[0];

			if (first === "search") {
				const type = segments[1] || "journal";
				const query = params.get("q") || "";
				if (type === "journal") renderJournalResults(query);
				else if (type === "article") renderArticleResults(query);
				else renderAuthorResults(query);
				return;
			}

			if (first === "backend") {
				renderBackoffice();
				return;
			}

			if (first === "journal") {
				renderJournalDetail(segments[1]);
				return;
			}
			if (first === "article") {
				renderArticleDetail(segments[1]);
				return;
			}
			if (first === "author") {
				renderAuthorDetail(segments.slice(1).join("/"));
				return;
			}

			app.innerHTML = `<section class="section"><a class="back-link" href="#/">← Back to Home</a><div class="empty">Page not found.</div></section>`;
		}

		async function bootstrapApp() {
			const syncedFromApi = await syncStateFromApi();
			if (!syncedFromApi) {
				await loadPersistentStateFromRepo();
			}
			window.addEventListener("hashchange", router);
			router();
		}

		bootstrapApp();
	</script>
</body>
</html>
